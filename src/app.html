<!doctype html>
<!-- data-theme selects the active theme (default: dark); the terminal `theme` command toggles this attribute. -->
	<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!-- Apply remembered theme + view mode before first paint. Default mode is
		     'gui' (the styled pages); the terminal is opt-in via / or the launcher. -->
		<script>
			try {
				var t = localStorage.getItem('theme');
				if (t) document.documentElement.dataset.theme = t;
				document.documentElement.dataset.mode = localStorage.getItem('mode') || 'gui';
			} catch (e) {
				document.documentElement.dataset.mode = 'gui';
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
